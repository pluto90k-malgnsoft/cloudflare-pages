<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Continuum Validator (PyScript)</title>
    
    <!-- Libraries -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.3.0/mux.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- External Assets -->
    <link rel="stylesheet" href="stype/base.css">
    <script src="js/base.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>HLS Continuum Validator v2.4🔍</h1>
        <p class="subtitle">PyScript + mux.js 를 이용한 브라우저 기반 고정밀 연속성 분석 도구</p>
    </header>

    <div class="card">
        <div class="input-group">
            <input type="text" id="m3u8-url" placeholder="분석할 HLS(.m3u8) 주소를 입력하세요" value="">
            <button id="btn-run" py-click="start_analysis">분석 시작</button>
        </div>
        <div class="settings">
            <label>
                시작 Index: 
                <input type="number" id="start-seg" value="0" min="0" style="width: 50px;">
            </label>
            <label>
                검사 개수: 
                <input type="number" id="max-segs" value="10" min="1" max="100" style="width: 50px;">
            </label>
            <label>
                프록시 URL 프리픽스 (선택):
                <input type="text" id="proxy-prefix" placeholder="https://cloudflare-proxy.pluto90k.workers.dev/?url=" value="https://cloudflare-proxy.pluto90k.workers.dev/?url=" style="width: 250px; padding: 4px 8px; font-size: 0.8rem;">
            </label>
            <div id="loader" class="loading-spinner"></div>
            <span id="status-text" style="font-size: 0.8rem; color: var(--accent-primary);">준비 완료</span>
        </div>
        <div class="cors-hint">
            ⚠️ <b>CORS 안내:</b> 외부 도메인 영상은 보안 정책상 프록시가 꼭 필요합니다. 에러 발생 시 다른 대안 앱이나 브라우저 확장을 사용해주세요.
        </div>
        <div class="progress-bar-container" id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="output-container">
        <div id="summary-dashboard"></div>
        <div id="log-content">
            <div class="log-info">애플리케이션이 준비되었습니다. M3U8 주소를 입력하고 분석을 시작하세요.</div>
        </div>
    </div>
</div>

<py-config>
    packages = ["m3u8", "ssl", "certifi"]
</py-config>

<py-script src="js/base.py"></py-script>

</body>
</html>
